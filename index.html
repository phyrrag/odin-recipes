<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Recipes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="header">
      <div class="header-logo">
        <h1>Odin Recipes</h1>
      </div>
      <div class="header-search">
        <img src="./img/search.png" />
        <input type="text" placeholder="What would you like to cook?" />
      </div>
      <div class="header-bookmark">
        <img src="./img/bookmark.png" />
        <p>Your Recipe Box</p>
        <div class="header-user">
          <img src="./img/user.png" />
        </div>
      </div>
    </section>
    <section class="header-navbar">
      <div>
        <ul>
          <li>What to cook</li>
          <li>Recipes</li>
          <li>Ingredients</li>
          <li>Occassions</li>
          <li>About</li>
        </ul>
      </div>
    </section>
    <section class="recipe-section">
      <div class="recipe-container">
        <div class="recipe-item">
          <div>
            <img src="./img/adobo.jpg" />
          </div>
          <div class="recipe-iteminfo">
            <div>
              <p id="recipe-name"><a href="./recipes/adobo.html">Chicken Adobo</a></p>
              <p id="recipe-chef">Odin Recipes</p>
            </div>
            <div class="recipe-dur">
              <p>45 minutes</p>
              <img id="bookmark-icon" src="./img/bookmark.png" />
            </div>
          </div>
        </div>
        <div class="recipe-item">
          <div>
            <img src="./img/ampalaya.jpg" />
          </div>
          <div class="recipe-iteminfo">
            <div>
              <p id="recipe-name"><a href="./recipes/ginisang-ampalaya.html">Ginisang Ampalaya</a></p>
              <p id="recipe-chef">Odin Recipes</p>
            </div>
            <div class="recipe-dur">
              <p>25 minutes</p>
              <img id="bookmark-icon" src="./img/bookmark.png" />
            </div>
          </div>
        </div>
        <div class="recipe-item">
          <div>
            <img src="./img/torta.jpeg" />
          </div>
          <div class="recipe-iteminfo">
            <div>
              <p id="recipe-name"><a href="../recipes/tortang-talong.html">Tortang Talong</a></p>
              <p id="recipe-chef">Odin Recipes</p>
            </div>
            <div class="recipe-dur">
              <p>30 minutes</p>
              <img id="bookmark-icon" src="./img/bookmark.png" />
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
